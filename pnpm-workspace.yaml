packages:
  - .

minimumReleaseAge: 2880
minimumReleaseAgeStrict: true

# Temporary exact-version exceptions for the July 2026 security releases.
# Remove after 2026-07-23T16:00:00Z.
minimumReleaseAgeExclude:
  - "next@15.5.21"
  - "@next/env@15.5.21"
  - "@next/swc-darwin-arm64@15.5.21"
  - "@next/swc-darwin-x64@15.5.21"
  - "@next/swc-linux-arm64-gnu@15.5.21"
  - "@next/swc-linux-arm64-musl@15.5.21"
  - "@next/swc-linux-x64-gnu@15.5.21"
  - "@next/swc-linux-x64-musl@15.5.21"
  - "@next/swc-win32-arm64-msvc@15.5.21"
  - "@next/swc-win32-x64-msvc@15.5.21"
  - "@opennextjs/cloudflare@1.20.2"
  - "@opennextjs/aws@4.1.0"

allowBuilds:
  "@biomejs/biome": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true

overrides:
  # --- pnpm v11 trust-downgrade guards (install-time, not audit) ---
  # @types/node pulls undici-types@6.21.0 and @babel/core pulls semver@6.3.1;
  # both lost provenance attestation and are blocked by pnpm's supply-chain
  # check. Pin to trusted releases (synced with tovo.dev).
  undici-types: 6.27.0
  semver@6: 7.8.4
  # --- Audit fix (moderate) ---
  # postcss <8.5.10: XSS via unescaped </style> in CSS stringify output.
  # Pulled transitively by next 15 / @next/third-parties / @opennextjs/cloudflare;
  # overridden because next 15 can't be bumped to a release bundling the patch.
  postcss: 8.5.14
